name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        php: ['8.4', '8.5']

    name: PHP ${{ matrix.php }}

    services:
      redis:
        image: redis:8
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: '6379'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-php-${{ matrix.php }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php }}-composer-

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo, sqlite3, json, curl, pcntl, redis, zip, apcu
          ini-values: apc.enable_cli=1
          coverage: none

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress --no-ansi

      - name: Prepare test storage
        run: |
          mkdir -p storage/cache
          touch storage/database.sqlite

      - name: QA (style + PHPStan)
        run: composer qa

      - name: PHPUnit (all suites, including external)
        run: composer test:all
